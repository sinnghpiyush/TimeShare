{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h1 class="fw-bold mb-3">
{{ blog.title }}
</h1>

<p class="text-muted">
Views: {{ blog.views }}
</p>

{% if blog.featured_image %}

<img src="{{ url_for('static', filename='uploads/' + blog.featured_image) }}"
style="width:100%; border-radius:12px; margin-bottom:20px;">

{% endif %}

<div class="blog-content">

{{ blog.content | safe }}

</div>

<a href="/" class="btn btn-secondary mt-4">
← Back to articles
</a>

</div>

{% endblock %}
