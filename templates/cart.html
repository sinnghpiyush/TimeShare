{% extends "base.html" %}

{% block content %}

<h2 class="mb-4 text-center">Your Cart 🛍️</h2><div class="row justify-content-center">
    <div class="col-md-6">    <div class="card p-4">

        {% if session.get("cart") %}

            {% for item in session.get("cart") %}
    <div class="d-flex justify-content-between align-items-center mb-2">
        
        <span>• {{ item }}</span>

        <div>
            <a href="/buy/{{ item }}" class="btn btn-success btn-sm me-2">Buy</a>
            <a href="/remove_from_cart/{{ loop.index0 }}" class="btn btn-danger btn-sm">Remove</a>
        </div>

    </div>
{% endfor %}

        {% else %}

            <p>Your cart is empty</p>

        {% endif %}

    </div>

</div>

</div>{% endblock %}
