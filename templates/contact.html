{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

<div class="card p-4">

<h2 class="text-center mb-4">Contact Us</h2>

<p class="text-center">
We are here to help you. If you have any questions, issues, or suggestions, feel free to contact us.
</p>

<p class="text-center">
Email: support@timeinshare.com <br>
Response Time: Within 24 hours
</p>

<hr>

<h4 class="mt-4">Send us a message</h4>

<form method="POST" action="/contact">

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Mobile Number</label>
<input type="text" name="mobile" class="form-control" required>
</div>

<div class="mb-3">
<label>Your Message</label>
<textarea name="message" class="form-control" rows="5" required></textarea>
</div>

<button class="btn btn-success w-100">Send Message</button>

</form>

</div>

</div>

{% endblock %}
