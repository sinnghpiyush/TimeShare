{% extends "base.html" %}

{% block content %}

<h2 class="mb-4 text-center">Create / Update Mentor Profile 🎓</h2>

<div class="card shadow-lg p-4 mx-auto" style="max-width: 600px;">

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">Degree</label>
            <input type="text" name="degree" class="form-control"
                   value="{{ profile.degree if profile else '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Skills</label>
            <input type="text" name="skills" class="form-control"
                   value="{{ profile.skills if profile else '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">College</label>
            <input type="text" name="college" class="form-control"
                   value="{{ profile.college if profile else '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Experience</label>
            <textarea name="experience" class="form-control" rows="4">{{ profile.experience if profile else '' }}</textarea>
        </div>

        <div class="mb-4">
            <label class="form-label">Profile Image</label>
            <input type="file" name="profile_image" class="form-control">
            <small class="text-light opacity-75">
                Leave empty if you don't want to change image
            </small>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Save Profile 💾
        </button>

    </form>

</div>

{% endblock %}
