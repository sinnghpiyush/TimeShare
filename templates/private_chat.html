{% extends "base.html" %}
{% block content %}

<style>  
.chat-container {  
    max-width: 800px;  
    margin: auto;  
}  
  
.chat-box {  
    height: 400px;  
    overflow-y: auto;  
    background: rgba(0,0,0,0.35);  
    border-radius: 15px;  
    padding: 20px;  
    margin-bottom: 10px;  
}  
  
.message {  
    margin-bottom: 12px;  
    padding: 10px 14px;  
    border-radius: 12px;  
    display: inline-block;  
    max-width: 75%;  
    animation: fadeIn 0.3s ease;  
}  
  
.my-message {  
    background: #6a11cb;  
    color: white;  
    float: right;  
    clear: both;  
}  
  
.other-message {  
    background: #ff4ecd;  
    color: white;  
    float: left;  
    clear: both;  
}  
  
#typingIndicator {  
    height: 20px;  
    font-size: 14px;  
    opacity: 0.8;  
    margin-bottom: 10px;  
}  
  
@keyframes fadeIn {  
    from { opacity: 0; transform: translateY(8px); }  
    to { opacity: 1; transform: translateY(0); }  
}  
</style>  <div class="chat-container">  <!-- Header -->  
<div class="d-flex align-items-center justify-content-between mb-3">  
    <h3 class="mb-0">  
        Chat with {{ other_user }}  
    </h3>  

    <span id="statusBadge"  
          class="badge {% if is_online %}bg-success{% else %}bg-secondary{% endif %}">  
        {% if is_online %}  
            🟢 Online  
        {% else %}  
            ⚫ Offline  
        {% endif %}  
    </span>  
</div>  

<!-- Chat Messages -->  
<div class="chat-box" id="chatBox">  

    {% for msg in messages %}  
        <div class="message {% if msg.sender_id == session.get('user_id') %}my-message{% else %}other-message{% endif %}">  
            {{ msg.message }}  
        </div>  
    {% endfor %}  

</div>  

<!-- Typing Indicator -->  
<div id="typingIndicator"></div>  

<!-- Input -->  
<div class="input-group">  
    <input type="text" id="messageInput" class="form-control"  
           placeholder="Type your message...">  
    <button class="btn btn-primary" onclick="sendMessage()">Send</button>  
</div>

</div>  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>  <script>  
const socket = io();  
const room = "{{ room }}";  
const username = "{{ session.get('name') }}";  
const otherUserId = Number("{{ other_user_id }}");  
  
// Scroll to bottom on load  
window.onload = function() {  
    const chatBox = document.getElementById("chatBox");  
    chatBox.scrollTop = chatBox.scrollHeight;  
};  
  
// Ask server for current online status  
socket.on("connect", function() {  
    socket.emit("check_user_status", {  
        other_user_id: otherUserId  
    });  
});  
  
// Live online/offline updates  
socket.on("user_status_change", function(data) {  
  
    const badge = document.getElementById("statusBadge");  
  
    if (data.user_id === otherUserId) {  
  
        if (data.status === "online") {  
            badge.classList.remove("bg-secondary");  
            badge.classList.add("bg-success");  
            badge.innerText = "🟢 Online";  
        } else {  
            badge.classList.remove("bg-success");  
            badge.classList.add("bg-secondary");  
            badge.innerText = "⚫ Offline";  
        }  
  
    }  
});  
  
// Join room  
socket.emit("join_room", { room: room });  
  
// Send message  
function sendMessage() {

    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    if (message === "") return;

    socket.emit("send_private_message", {
        room: room,
        username: username,
        message: message
    });

    input.value = "";

    // Keep focus after sending
    input.focus();
}  
  
// Receive new message live  
socket.on("receive_private_message", function(data) {  
  
    const chatBox = document.getElementById("chatBox");  
    const messageDiv = document.createElement("div");  
  
    if (data.username === username) {  
        messageDiv.className = "message my-message";  
    } else {  
        messageDiv.className = "message other-message";  
    }  
  
    messageDiv.innerText = data.message;  
  
    chatBox.appendChild(messageDiv);  
    chatBox.scrollTop = chatBox.scrollHeight;  
});  
  
// Typing indicator logic  
let typingTimer;  
const inputField = document.getElementById("messageInput");  
  
// Send on Enter key
inputField.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});
inputField.addEventListener("input", function() {  
  
    socket.emit("typing", {  
        room: room,  
        username: username  
    });  
  
    clearTimeout(typingTimer);  
  
    typingTimer = setTimeout(function() {  
        socket.emit("stop_typing", {  
            room: room  
        });  
    }, 1000);  
  
});  
  
socket.on("user_typing", function(data) {  
  
    const indicator = document.getElementById("typingIndicator");  
    indicator.innerText = data.username + " is typing...";  
  
});  
  
socket.on("user_stop_typing", function() {  
  
    const indicator = document.getElementById("typingIndicator");  
    indicator.innerText = "";  
  
});  
</script>  {% endblock %}
