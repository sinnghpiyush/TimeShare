{% extends "base.html" %}
{% block content %}

<style>
.option-box {
    display: block;
    background: rgba(255,255,255,0.1);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

.option-box input {
    margin-right: 10px;
    transform: scale(1.3);
}
</style>

<div class="container mt-5">
    <div class="card p-4">

        <h3 class="text-center mb-4">Test</h3>

        <form method="POST" action="/submit-test/{{ test_type }}">

            {% for q in questions %}
    {% set q_index = loop.index0 %}

    <div class="mb-4">

        <h5>{{ q.q }}</h5>

        {% for opt in q.options %}
            <label class="option-box">
                <input 
                    type="radio" 
                    name="q{{ q_index }}" 
                    value="{{ opt }}" 
                    required
                >
                <span>{{ opt }}</span>
            </label>
        {% endfor %}

    </div>
{% endfor %}

            <button class="btn btn-success w-100">Submit</button>

        </form>

    </div>
</div>

{% endblock %}
